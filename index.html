<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockAD Web - Active Directory Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            background-color: #1e1e1e;
            color: #cccccc;
            height: 100vh;
            overflow: hidden;
        }

        .toolbar {
            background: linear-gradient(180deg, #2d2d30 0%, #252526 100%);
            border-bottom: 1px solid #3f3f46;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-btn {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #ccc;
            padding: 4px 12px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
        }

        .toolbar-btn:hover {
            background: #4a4a4a;
        }

        .toolbar-separator {
            width: 1px;
            height: 20px;
            background: #555;
        }

        .status-bar {
            background: #007acc;
            color: white;
            padding: 2px 8px;
            font-size: 11px;
            border-top: 1px solid #005a9e;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .tree-panel {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3f3f46;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tree-header {
            background: #2d2d30;
            padding: 6px 8px;
            border-bottom: 1px solid #3f3f46;
            font-weight: 600;
            color: #fff;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tree-content {
            flex: 1;
            overflow: auto;
            padding: 4px 0;
        }

        .tree-node {
            user-select: none;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 3px 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tree-item:hover {
            background: #2a2d2e;
        }

        .tree-item.selected {
            background: #094771;
        }

        .tree-item.selected:hover {
            background: #094771;
        }

        .tree-toggle {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #808080;
            font-size: 10px;
            flex-shrink: 0;
        }

        .tree-toggle.empty {
            visibility: hidden;
        }

        .tree-icon {
            width: 16px;
            height: 16px;
            margin-right: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tree-label {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-children {
            display: none;
            padding-left: 16px;
        }

        .tree-children.expanded {
            display: block;
        }

        .details-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .details-tabs {
            background: #2d2d30;
            border-bottom: 1px solid #3f3f46;
            display: flex;
        }

        .details-tab {
            padding: 8px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #808080;
        }

        .details-tab:hover {
            color: #ccc;
        }

        .details-tab.active {
            color: #fff;
            border-bottom-color: #007acc;
        }

        .details-content {
            flex: 1;
            overflow: auto;
            padding: 16px;
        }

        .object-header {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #2d2d30;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .object-header-icon {
            width: 48px;
            height: 48px;
            margin-right: 12px;
        }

        .object-header-info h2 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .object-header-info span {
            color: #808080;
            font-size: 11px;
        }

        .section {
            background: #252526;
            border: 1px solid #3f3f46;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .section-header {
            background: #2d2d30;
            padding: 8px 12px;
            border-bottom: 1px solid #3f3f46;
            font-weight: 600;
            color: #fff;
        }

        .section-content {
            padding: 12px;
        }

        .property-row {
            display: flex;
            margin-bottom: 8px;
        }

        .property-row:last-child {
            margin-bottom: 0;
        }

        .property-label {
            width: 140px;
            color: #808080;
            flex-shrink: 0;
        }

        .property-value {
            color: #ccc;
            word-break: break-all;
        }

        .markdown-content {
            color: #ccc;
            line-height: 1.6;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            color: #fff;
            margin: 16px 0 8px 0;
        }

        .markdown-content h1:first-child, .markdown-content h2:first-child, .markdown-content h3:first-child {
            margin-top: 0;
        }

        .markdown-content p {
            margin-bottom: 12px;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }

        .markdown-content th, .markdown-content td {
            border: 1px solid #3f3f46;
            padding: 8px;
            text-align: left;
        }

        .markdown-content th {
            background: #2d2d30;
            color: #fff;
        }

        .markdown-content code {
            background: #1e1e1e;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Consolas', monospace;
        }

        .markdown-content pre {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
        }

        .markdown-content ul, .markdown-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .markdown-content li {
            margin-bottom: 4px;
        }

        .counter-section {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .counter-item {
            background: #1e1e1e;
            border: 1px solid #3f3f46;
            border-radius: 4px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .counter-icon {
            width: 24px;
            height: 24px;
        }

        .counter-info {
            display: flex;
            flex-direction: column;
        }

        .counter-value {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .counter-label {
            font-size: 10px;
            color: #808080;
        }

        .icon-domain { color: #7ab51d; }
        .icon-ou { color: #7ab51d; }
        .icon-user { color: #4e9cdd; }
        .icon-group { color: #7ab51d; }
        .icon-computer { color: #7ab51d; }
        .icon-gpo { color: #7ab51d; }
        .icon-gmsa { color: #c19c00; }
        .icon-default { color: #808080; }

        .icon-large { font-size: 48px; }
        .icon-medium { font-size: 24px; }
        .icon-small { font-size: 14px; }

        .context-menu {
            position: absolute;
            background: #2d2d30;
            border: 1px solid #3f3f46;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            min-width: 180px;
            padding: 4px 0;
        }

        .context-menu-item {
            padding: 6px 16px;
            cursor: pointer;
            color: #ccc;
            white-space: nowrap;
        }

        .context-menu-item:hover {
            background: #094771;
            color: #fff;
        }

        .context-menu-item.danger:hover {
            background: #a1260d;
            color: #fff;
        }

        .context-menu-separator {
            height: 1px;
            background: #3f3f46;
            margin: 4px 0;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-box {
            background: #252526;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            width: 360px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }

        .modal-title {
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-field {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal-field label {
            color: #808080;
            font-size: 11px;
        }

        .modal-field input,
        .modal-field select,
        .modal-field textarea {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #ccc;
            padding: 6px 8px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 12px;
        }

        .modal-field textarea {
            resize: vertical;
            min-height: 60px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
        }

        .modal-btn {
            padding: 6px 14px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #555;
            background: #3c3c3c;
            color: #ccc;
            font-size: 12px;
        }

        .modal-btn:hover {
            background: #4a4a4a;
        }

        .modal-btn.primary {
            background: #0e639c;
            border-color: #1177bb;
            color: #fff;
        }

        .modal-btn.primary:hover {
            background: #1177bb;
        }
    </style>
</head>

        function getIcon(type) {
            const icons = {
                'Domain': { symbol: '&#x1F3E6;', class: 'icon-domain' },
                'OU': { symbol: '&#x1F4C1;', class: 'icon-ou' },
                'User': { symbol: '&#x1F464;', class: 'icon-user' },
                'Group': { symbol: '&#x1F465;', class: 'icon-group' },
                'Computer': { symbol: '&#x1F5A5;', class: 'icon-computer' },
                'GPO': { symbol: '&#x1F4DC;', class: 'icon-gpo' },
                'GMSA': { symbol: '&#x2699;', class: 'icon-gmsa' }
            };
            const icon = icons[type] || { symbol: '&#x1F4CC;', class: 'icon-default' };
            return `<span class="icon-small ${icon.class}">${icon.symbol}</span>`;
        }

                'User': { symbol: '&#x1F464;', class: 'icon-user' },
                'Group': { symbol: '&#x1F465;', class: 'icon-group' },
                'Computer': { symbol: '&#x1F5A5;', class: 'icon-computer' },
                'GPO': { symbol: '&#x1F4DC;', class: 'icon-gpo' },
                'GMSA': { symbol: '&#x2699;', class: 'icon-gmsa' }
            };
            const icon = icons[type] || { symbol: '&#x1F4CC;', class: 'icon-default' };
            return `<span class="icon-medium ${icon.class}">${icon.symbol}</span>`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str === null || str === undefined ? '' : String(str);
            return div.innerHTML;
        }

        function renderTree(node, container) {
            const hasChildren = node.Children && node.Children.length > 0;

            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'tree-node';

            const itemDiv = document.createElement('div');
            itemDiv.className = 'tree-item';
            itemDiv.dataset.id = node._id;
            itemDiv.innerHTML = `
                <span class="tree-toggle ${hasChildren ? '' : 'empty'}">&#x25B6;</span>
                <span class="tree-icon">${getIcon(node.Type)}</span>
                <span class="tree-label">${escapeHtml(node.Name)}</span>
            `;

            itemDiv.onclick = (e) => {
                e.stopPropagation();
                const toggle = itemDiv.querySelector('.tree-toggle');
                if (hasChildren && e.target === toggle) {
                    toggleNode(itemDiv, toggle);
                }
                selectNode(node, itemDiv);
            };

            itemDiv.oncontextmenu = (e) => showContextMenu(e, node);

            nodeDiv.appendChild(itemDiv);

            if (hasChildren) {
                const childrenDiv = document.createElement('div');
                childrenDiv.className = 'tree-children';

                node.Children.forEach(child => renderTree(child, childrenDiv));

                nodeDiv.appendChild(childrenDiv);
            }

            container.appendChild(nodeDiv);
        }

        function toggleNode(itemDiv, toggle) {
            const id = parseInt(itemDiv.dataset.id, 10);
            const childrenDiv = itemDiv.nextElementSibling;
            if (childrenDiv && childrenDiv.classList.contains('tree-children')) {
                if (childrenDiv.classList.contains('expanded')) {
                    childrenDiv.classList.remove('expanded');
                    toggle.innerHTML = '&#x25B6;';
                    expandedIds.delete(id);
                } else {
                    childrenDiv.classList.add('expanded');
                    toggle.innerHTML = '&#x25BC;';
                    expandedIds.add(id);
                }
            }
        }

        function selectNode(node, itemDiv) {
            document.querySelectorAll('.tree-item.selected').forEach(el => el.classList.remove('selected'));
            itemDiv.classList.add('selected');
            selectedId = node._id;
            renderDetails(node);
            updateStatus(`Selected: ${node.Name} (${node.Type})`);
        }

        function restoreTreeState() {
            document.querySelectorAll('.tree-item').forEach(item => {
                const id = parseInt(item.dataset.id, 10);
                const childrenDiv = item.nextElementSibling;
                const toggle = item.querySelector('.tree-toggle');
                if (expandedIds.has(id) && childrenDiv && childrenDiv.classList.contains('tree-children')) {
                    childrenDiv.classList.add('expanded');
                    if (toggle) toggle.innerHTML = '&#x25BC;';
                }
                if (id === selectedId) {
                    item.classList.add('selected');
                }
            });

            if (selectedId !== null) {
                const node = findNodeById(adData, selectedId);
                if (node) renderDetails(node);
            }
        }

        function findNodeById(node, id) {
            if (node._id === id) return node;
            if (node.Children) {
                for (const child of node.Children) {
                    const found = findNodeById(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParent(node, id) {
            if (!node.Children) return null;
            for (const child of node.Children) {
                if (child._id === id) return node;
                const found = findParent(child, id);
                if (found) return found;
            }
            return null;
        }

        function cloneNode(node, isTop = true) {
            return {
                Name: isTop ? `${node.Name} - Copy` : node.Name,
                Type: node.Type,
                Description: node.Description || '',
                Children: (node.Children || []).map(child => cloneNode(child, false)),
                _id: nodeIdCounter++
            };
        }

        function duplicateNode(node) {
            const parent = findParent(adData, node._id);
            if (!parent) {
                updateStatus('Cannot duplicate the root domain object');
                return;
            }
            const clone = cloneNode(node);
            const idx = parent.Children.findIndex(c => c._id === node._id);
            parent.Children.splice(idx + 1, 0, clone);
            expandedIds.add(parent._id);
            selectedId = clone._id;
            renderTreeView();
            updateStatus(`Duplicated "${node.Name}" as "${clone.Name}"`);
        }

        function deleteNodeConfirm(node) {
            const parent = findParent(adData, node._id);
            if (!parent) {
                updateStatus('Cannot delete the root domain object');
                return;
            }
            const hasKids = node.Children && node.Children.length > 0;
            const msg = `Delete "${node.Name}" (${node.Type})${hasKids ? ' and all of its child objects' : ''}?`;
            if (!confirm(msg)) return;
            parent.Children = parent.Children.filter(c => c._id !== node._id);
            if (selectedId === node._id) selectedId = adData._id;
            renderTreeView();
            updateStatus(`Deleted "${node.Name}"`);
        }

        function closeContextMenu() {
            const existing = document.getElementById('activeContextMenu');
            if (existing) existing.remove();
        }

        function showContextMenu(e, node) {
            e.preventDefault();
            e.stopPropagation();
            closeContextMenu();

            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.id = 'activeContextMenu';

            const addBtn = document.createElement('div');
            addBtn.className = 'context-menu-item';
            addBtn.textContent = 'Add Child Object...';
            addBtn.onclick = () => { closeContextMenu(); openAddChildModal(node); };
            menu.appendChild(addBtn);

            const renameBtn = document.createElement('div');
            renameBtn.className = 'context-menu-item';
            renameBtn.textContent = 'Rename...';
            renameBtn.onclick = () => { closeContextMenu(); openRenameModal(node); };
            menu.appendChild(renameBtn);

            if (node !== adData) {
                const sep = document.createElement('div');
                sep.className = 'context-menu-separator';
                menu.appendChild(sep);

                const dupBtn = document.createElement('div');
                dupBtn.className = 'context-menu-item';
                dupBtn.textContent = 'Duplicate';
                dupBtn.onclick = () => { closeContextMenu(); duplicateNode(node); };
                menu.appendChild(dupBtn);

                const delBtn = document.createElement('div');
                delBtn.className = 'context-menu-item danger';
                delBtn.textContent = 'Delete';
                delBtn.onclick = () => { closeContextMenu(); deleteNodeConfirm(node); };
                menu.appendChild(delBtn);
            }

            document.body.appendChild(menu);
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';

            const rect = menu.getBoundingClientRect();
            if (rect.right > window.innerWidth) {
                menu.style.left = Math.max(8, window.innerWidth - rect.width - 8) + 'px';
            }
            if (rect.bottom > window.innerHeight) {
                menu.style.top = Math.max(8, window.innerHeight - rect.height - 8) + 'px';
            }

            setTimeout(() => {
                document.addEventListener('click', closeContextMenu, { once: true });
            }, 0);
        }

        function openAddChildModal(parentNode) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal-box">
                    <div class="modal-title">Add Child Object to "${escapeHtml(parentNode.Name)}"</div>
                    <div class="modal-field">
                        <label>Object Type</label>
                        <select id="modalType">
                            <option value="OU">Organizational Unit</option>
                            <option value="GPO">GPO</option>
                            <option value="Group">Group</option>
                            <option value="Computer">Computer</option>
                            <option value="User">User</option>
                            <option value="GMSA">Service Account (GMSA)</option>
                        </select>
                    </div>
                    <div class="modal-field">
                        <label>Name</label>
                        <input type="text" id="modalName" placeholder="Object name">
                    </div>
                    <div class="modal-field">
                        <label>Description (optional, Markdown supported)</label>
                        <textarea id="modalDescription" placeholder="Description..."></textarea>
                    </div>
                    <div class="modal-actions">
                        <button class="modal-btn" id="modalCancel">Cancel</button>
                        <button class="modal-btn primary" id="modalAdd">Add</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const nameInput = overlay.querySelector('#modalName');
            nameInput.focus();

            function close() {
                overlay.remove();
                document.removeEventListener('keydown', escHandler);
            }
            function escHandler(e) {
                if (e.key === 'Escape') close();
            }

            overlay.querySelector('#modalCancel').onclick = close;
            overlay.onclick = (e) => { if (e.target === overlay) close(); };
            document.addEventListener('keydown', escHandler);

            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') overlay.querySelector('#modalAdd').click();
            });

            overlay.querySelector('#modalAdd').onclick = () => {
                const name = nameInput.value.trim();
                if (!name) {
                    nameInput.focus();
                    return;
                }
                const type = overlay.querySelector('#modalType').value;
                const description = overlay.querySelector('#modalDescription').value;

                const newNode = {
                    Name: name,
                    Type: type,
                    Description: description,
                    Children: [],
                    _id: nodeIdCounter++
                };

                parentNode.Children = parentNode.Children || [];
                parentNode.Children.push(newNode);
                expandedIds.add(parentNode._id);
                selectedId = newNode._id;
                close();
                renderTreeView();
                updateStatus(`Added ${type} "${name}" under "${parentNode.Name}"`);
            };
        }

        function openRenameModal(node) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal-box">
                    <div class="modal-title">Rename "${escapeHtml(node.Name)}"</div>
                    <div class="modal-field">
                        <label>Name</label>
                        <input type="text" id="modalRenameName" placeholder="Object name">
                    </div>
                    <div class="modal-actions">
                        <button class="modal-btn" id="modalCancel">Cancel</button>
                        <button class="modal-btn primary" id="modalRename">Rename</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const nameInput = overlay.querySelector('#modalRenameName');
            nameInput.value = node.Name;
            nameInput.focus();
            nameInput.select();

            function close() {
                overlay.remove();
                document.removeEventListener('keydown', escHandler);
            }
            function escHandler(e) {
                if (e.key === 'Escape') close();
            }

            overlay.querySelector('#modalCancel').onclick = close;
            overlay.onclick = (e) => { if (e.target === overlay) close(); };
            document.addEventListener('keydown', escHandler);

            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') overlay.querySelector('#modalRename').click();
            });

            overlay.querySelector('#modalRename').onclick = () => {
                const name = nameInput.value.trim();
                if (!name) {
                    nameInput.focus();
                    return;
                }
                const oldName = node.Name;
                node.Name = name;
                close();
                renderTreeView();
                updateStatus(`Renamed "${oldName}" to "${name}"`);
            };
        }

        function stripInternal(node) {
            return {
                Name: node.Name,
                Type: node.Type,
                Description: node.Description || '',
                Children: (node.Children || []).map(stripInternal)
            };
        }

        function exportLayout() {
            const data = stripInternal(adData);
            const json = JSON.stringify(data, null, 4);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${(adData.Name || 'ad-layout').replace(/[^a-z0-9.-]/gi, '_')}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            updateStatus('Exported AD layout to JSON');
        }

        function normalizeAndAssignIds(node) {
            node.Children = Array.isArray(node.Children) ? node.Children : [];
            node.Description = node.Description || '';
            node.Type = node.Type || 'OU';
            node.Name = node.Name || 'Unnamed';
            node._id = nodeIdCounter++;
            node.Children.forEach(normalizeAndAssignIds);
            return node;
        }

        function importLayoutFile(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const parsed = JSON.parse(ev.target.result);
                    if (!parsed || typeof parsed !== 'object' || !parsed.Name || !parsed.Type) {
                        throw new Error('root object must have "Name" and "Type" fields');
                    }
                    nodeIdCounter = 0;
                    adData = normalizeAndAssignIds(parsed);
                    expandedIds = new Set();
                    selectedId = adData._id;
                    renderTreeView();
                    expandAll();
                    updateStatus(`Imported AD layout from "${file.name}"`);
                } catch (err) {
                    alert('Failed to import JSON file:\n' + err.message);
                }
            };
            reader.onerror = () => alert('Failed to read the selected file.');
            reader.readAsText(file);
        }

        function renderDetails(node) {
            const detailsContent = document.getElementById('detailsContent');
            const counts = countObjects(node);

            let descriptionHtml = '';
            if (node.Description) {
                descriptionHtml = `
                    <div class="section">
                        <div class="section-header">Description</div>
                        <div class="section-content">
                            <div class="markdown-content">${marked.parse(node.Description)}</div>
                        </div>
                    </div>
                `;
            }

            detailsContent.innerHTML = `
                <div class="object-header">
                    <div class="object-header-icon">${getLargeIcon(node.Type)}</div>
                    <div class="object-header-info">
                        <h2>${escapeHtml(node.Name)}</h2>
                        <span>${escapeHtml(node.Type)}</span>
                    </div>
                </div>

                <div class="section">
                    <div class="section-header">Object Info</div>
                    <div class="section-content">
                        <div class="property-row">
                            <span class="property-label">Name:</span>
                            <span class="property-value">${escapeHtml(node.Name)}</span>
                        </div>
                        <div class="property-row">
                            <span class="property-label">Type:</span>
                            <span class="property-value">${escapeHtml(node.Type)}</span>
                        </div>
                    </div>
                </div>

                ${descriptionHtml}

                <div class="section">
                    <div class="section-header">Object Summary</div>
                    <div class="section-content">
                        <div class="counter-section">
                            ${counts.Computers ? `<div class="counter-item"><div class="counter-icon">${getMediumIcon('Computer')}</div><div class="counter-info"><span class="counter-value">${counts.Computers}</span><span class="counter-label">Computers</span></div></div>` : ''}
                            ${counts.Users ? `<div class="counter-item"><div class="counter-icon">${getMediumIcon('User')}</div><div class="counter-info"><span class="counter-value">${counts.Users}</span><span class="counter-label">Users</span></div></div>` : ''}
                            ${counts.Groups ? `<div class="counter-item"><div class="counter-icon">${getMediumIcon('Group')}</div><div class="counter-info"><span class="counter-value">${counts.Groups}</span><span class="counter-label">Groups</span></div></div>` : ''}
                            ${counts.GMSAs ? `<div class="counter-item"><div class="counter-icon">${getMediumIcon('GMSA')}</div><div class="counter-info"><span class="counter-value">${counts.GMSAs}</span><span class="counter-label">GMSAs</span></div></div>` : ''}
                            ${counts.GPOs ? `<div class="counter-item"><div class="counter-icon">${getMediumIcon('GPO')}</div><div class="counter-info"><span class="counter-value">${counts.GPOs}</span><span class="counter-label">GPOs</span></div></div>` : ''}
                            ${counts.OUs ? `<div class="counter-item"><div class="counter-icon">${getMediumIcon('OU')}</div><div class="counter-info"><span class="counter-value">${counts.OUs}</span><span class="counter-label">OUs</span></div></div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function countObjects(node, counts = { Computers: 0, Users: 0, Groups: 0, GMSAs: 0, GPOs: 0, OUs: 0 }) {
            if (!node) return counts;

            switch (node.Type) {
                case 'Computer': counts.Computers++; break;
                case 'User': counts.Users++; break;
                case 'Group': counts.Groups++; break;
                case 'GMSA': counts.GMSAs++; break;
                case 'GPO': counts.GPOs++; break;
                case 'OU': counts.OUs++; break;
            }

            if (node.Children) {
                node.Children.forEach(child => countObjects(child, counts));
            }

            return counts;
        }

        function updateStatus(message) {
            document.getElementById('statusBar').textContent = message;
        }

        function expandAll() {
            document.querySelectorAll('.tree-item').forEach(item => expandedIds.add(parseInt(item.dataset.id, 10)));
            document.querySelectorAll('.tree-children').forEach(el => el.classList.add('expanded'));
            document.querySelectorAll('.tree-toggle:not(.empty)').forEach(el => el.innerHTML = '&#x25BC;');
            updateStatus('Expanded all nodes');
        }

        function collapseAll() {
            expandedIds.clear();
            document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('expanded'));
            document.querySelectorAll('.tree-toggle:not(.empty)').forEach(el => el.innerHTML = '&#x25B6;');
            updateStatus('Collapsed all nodes');
        }

        function renderTreeView() {
            const treeContent = document.getElementById('treeContent');
            treeContent.innerHTML = '';
            renderTree(adData, treeContent);
            restoreTreeState();
        }

        function initialize() {
            normalizeAndAssignIds(adData);
            selectedId = adData._id;
            renderTreeView();
            expandAll();
            updateStatus('Ready - ad.corp.com domain loaded');

            document.getElementById('importFileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) importLayoutFile(file);
                e.target.value = '';
            });
        }

        initialize();
    </script>
</body>
</html>
